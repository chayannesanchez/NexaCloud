name: Deploy NexaCloud Betek AWS Serverless

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy infrastructure"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_WORKING_DIR: terraform
  TERRAFORM_VAR_FILE: environments/development.tfvars
  TF_VAR_admin_email: ${{ secrets.TF_ADMIN_EMAIL }}
  TF_VAR_admin_temp_password: ${{ secrets.TF_ADMIN_TEMP_PASSWORD }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          CHECK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          CHECK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CHECK_TF_ADMIN_EMAIL: ${{ secrets.TF_ADMIN_EMAIL }}
          CHECK_TF_ADMIN_TEMP_PASSWORD: ${{ secrets.TF_ADMIN_TEMP_PASSWORD }}
        run: |
          test -n "$CHECK_AWS_ACCESS_KEY_ID" || { echo "Missing secret: AWS_ACCESS_KEY_ID"; exit 1; }
          test -n "$CHECK_AWS_SECRET_ACCESS_KEY" || { echo "Missing secret: AWS_SECRET_ACCESS_KEY"; exit 1; }
          test -n "$CHECK_TF_ADMIN_EMAIL" || { echo "Missing secret: TF_ADMIN_EMAIL"; exit 1; }
          test -n "$CHECK_TF_ADMIN_TEMP_PASSWORD" || { echo "Missing secret: TF_ADMIN_TEMP_PASSWORD"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve backend names
        shell: bash
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_STATE_BUCKET=nexacloud-betek-dev-tfstate-${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "TF_LOCK_TABLE=nexacloud-betek-dev-tf-locks" >> "$GITHUB_ENV"
          echo "TF_STATE_KEY=nexacloud-betek/dev/terraform.tfstate" >> "$GITHUB_ENV"

      - name: Bootstrap Terraform backend
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" >/dev/null 2>&1; then
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST

            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: python -m compileall backend

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform fmt -recursive -check

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform plan -var-file="${TERRAFORM_VAR_FILE}" -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy plan
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform plan -destroy -var-file="${TERRAFORM_VAR_FILE}" -out=tfplan

      - name: Terraform destroy apply
        if: ${{ github.event.inputs.destroy == 'true' }}
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform outputs
        if: ${{ github.event.inputs.destroy != 'true' }}
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: |
          terraform output
          echo "Website URL: $(terraform output -raw website_url 2>/dev/null || true)"
