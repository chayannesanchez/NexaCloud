<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaCloud - Centro de Soporte | Login</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="login-style.css">
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3/build/jwt-decode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aws-sdk@2/dist/aws-sdk.min.js"></script>
    <script src="../api-config.js"></script>
    <script src="../auth-cognito.js"></script>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">☁️</div>
                <h1 class="login-title">NexaCloud</h1>
                <p class="login-subtitle">Centro de Soporte Técnico</p>
            </div>

            <!-- Alert para errores -->
            <div id="alertError" class="alert alert-error" style="display: none;">
                <span id="alertErrorText">❌ Error</span>
            </div>

            <!-- Alert para éxito -->
            <div id="alertSuccess" class="alert alert-success" style="display: none;">
                <span id="alertSuccessText">✅ Éxito</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember" id="remember">
                        Recuérdame
                    </label>
                    <a href="#forgot-password" onclick="showForgotPasswordForm(); return false;">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <!-- Modal para reset de contraseña -->
    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeForgotPasswordForm()">&times;</span>
            <h2>Recuperar Contraseña</h2>
            
            <div id="forgotPasswordStep1">
                <p>Ingresa tu email para recibir un código de confirmación:</p>
                <input 
                    type="email" 
                    id="forgotEmail" 
                    placeholder="tu@email.com" 
                    required
                >
                <button type="button" class="btn btn-primary" onclick="sendForgotPasswordCode()">
                    Enviar Código
                </button>
            </div>

            <div id="forgotPasswordStep2" style="display: none;">
                <p>Ingresa el código que recibiste y tu nueva contraseña:</p>
                <input 
                    type="text" 
                    id="resetCode" 
                    placeholder="Código de confirmación" 
                    required
                >
                <input 
                    type="password" 
                    id="newPassword" 
                    placeholder="Nueva contraseña" 
                    required
                >
                <button type="button" class="btn btn-primary" onclick="confirmResetPassword()">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <script>
        async function loadNavbar() {
            const container = document.getElementById('navbar-container');
            if (!container) {
                return;
            }

            try {
                const response = await fetch('login-nav.html');
                container.innerHTML = await response.text();
            } catch (error) {
                console.error('No se pudo cargar login-nav.html', error);
            }
        }

        loadNavbar();

        // Verificar si ya hay una sesión activa
        if (cognito_isAuthenticated()) {
            window.location.href = '../support/support.html';
        }

        /**
         * Mostrar alerta de error
         */
        function showError(message) {
            const alertError = document.getElementById('alertError');
            const alertErrorText = document.getElementById('alertErrorText');
            alertErrorText.textContent = '❌ ' + message;
            alertError.style.display = 'block';
            
            setTimeout(() => {
                alertError.style.display = 'none';
            }, 5000);
        }

        /**
         * Mostrar alerta de éxito
         */
        function showSuccess(message) {
            const alertSuccess = document.getElementById('alertSuccess');
            const alertSuccessText = document.getElementById('alertSuccessText');
            alertSuccessText.textContent = '✅ ' + message;
            alertSuccess.style.display = 'block';
        }

        // Manejo del formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // Mostrar estado de carga
            submitBtn.disabled = true;
            submitBtn.textContent = 'Iniciando sesión...';
            
            try {
                // Llamar a Cognito para autenticar
                const response = await cognito_login(email, password);
                
                if (response.success) {
                    // Mostrar mensaje de éxito
                    showSuccess('Sesión iniciada correctamente');
                    
                    // Guardar email si está marcado "Recuérdame"
                    const rememberCheckbox = document.getElementById('remember');
                    if (rememberCheckbox.checked) {
                        localStorage.setItem('rememberedEmail', email);
                    }
                    
                    // Redirigir al panel de soporte después de 1 segundo
                    setTimeout(() => {
                        window.location.href = '../support/support.html';
                    }, 1000);
                } else {
                    // Mostrar error
                    showError(response.message || 'Error al iniciar sesión');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Iniciar Sesión';
                }
            } catch (error) {
                console.error('Error en login:', error);
                showError('Error de conexión. Verifica tu conexión a internet');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar Sesión';
            }
        });

        // Recordar email si está marcado
        const rememberCheckbox = document.getElementById('remember');
        const emailInput = document.getElementById('email');

        if (localStorage.getItem('rememberedEmail')) {
            emailInput.value = localStorage.getItem('rememberedEmail');
            rememberCheckbox.checked = true;
        }

        rememberCheckbox.addEventListener('change', function() {
            if (this.checked) {
                localStorage.setItem('rememberedEmail', emailInput.value);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
        });

        emailInput.addEventListener('change', function() {
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberedEmail', this.value);
            }
        });

        /**
         * Mostrar formulario de recuperación de contraseña
         */
        function showForgotPasswordForm() {
            const modal = document.getElementById('forgotPasswordModal');
            const step1 = document.getElementById('forgotPasswordStep1');
            const step2 = document.getElementById('forgotPasswordStep2');
            
            modal.style.display = 'block';
            step1.style.display = 'block';
            step2.style.display = 'none';
            
            // Cerrar cuando se haga clic fuera del modal
            window.onclick = function(event) {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            };
        }

        /**
         * Cerrar formulario de recuperación
         */
        function closeForgotPasswordForm() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }

        /**
         * Enviar código de reset
         */
        async function sendForgotPasswordCode() {
            const email = document.getElementById('forgotEmail').value;
            
            if (!email) {
                showError('Por favor ingresa tu email');
                return;
            }

            const result = await cognito_forgotPassword(email);
            
            if (result.success) {
                // Mostrar paso 2
                document.getElementById('forgotPasswordStep1').style.display = 'none';
                document.getElementById('forgotPasswordStep2').style.display = 'block';
                showSuccess(result.message);
            } else {
                showError(result.message);
            }
        }

        /**
         * Confirmar reset de contraseña
         */
        async function confirmResetPassword() {
            const email = document.getElementById('forgotEmail').value;
            const code = document.getElementById('resetCode').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!code || !newPassword) {
                showError('Por favor completa todos los campos');
                return;
            }

            const result = await cognito_confirmForgotPassword(email, code, newPassword);
            
            if (result.success) {
                showSuccess(result.message);
                closeForgotPasswordForm();
                
                // Auto-llenar el email en el formulario principal
                document.getElementById('email').value = email;
                document.getElementById('password').focus();
            } else {
                showError(result.message);
            }
        }
    </script>

    <style>
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: black;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .modal-content button {
            width: 100%;
            margin-top: 10px;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: 500;
        }

        .alert-error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .alert-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
    </style>
</body>
</html>
